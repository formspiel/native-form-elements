name: Update footer version

permissions:
  contents: write

on:
  push:
    branches: [master]

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version string in footer
        run: |
          VERSION=$(cat VERSION)
          HASH=$(git rev-parse --short ${{ github.sha }})
          sed -i "s|<span id=\"footer-version\">[^<]*</span>|<span id=\"footer-version\">${VERSION}·${HASH}</span>|" index.html

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet index.html && exit 0
          git add index.html
          git commit -m "chore: update version [skip ci]"
          git push
